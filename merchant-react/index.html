<!doctype html>
<html lang="zh-CN" data-theme="dark" class="dark">
  <head>
    <script>
      (function () {
        try {
          var theme = 'dark'
          var raw = localStorage.getItem('xiaoone-merchant-theme')
          if (raw) {
            try {
              var parsed = JSON.parse(raw)
              if (parsed && parsed.state && (parsed.state.mode === 'light' || parsed.state.mode === 'dark')) {
                theme = parsed.state.mode
              }
            } catch (e) {
              if (raw === 'light' || raw === 'dark') theme = raw
            }
          } else {
            var portalTheme = localStorage.getItem('xiaoone.user.portal.theme')
            if (portalTheme === 'light' || portalTheme === 'dark') theme = portalTheme
          }
          document.documentElement.dataset.theme = theme
          document.documentElement.classList.toggle('dark', theme === 'dark')
          document.documentElement.style.colorScheme = theme
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="xiaoone-env" content="local" />
    <link data-xiaoone-theme-favicon rel="icon" type="image/png" href="/logo/favicon.png" />
    <link rel="apple-touch-icon" href="/logo/favicon.png" />
    <title>xiaoone · 商户智能工作站｜AI 团队 + 客服闭环</title>
    <meta name="description" content="xiaoone 面向商户的智能工作站，提供客服、图文视频文案创作、软件开发与企业服务的 AI 团队，依托语料库与多渠道，构建可度量的服务闭环。" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
